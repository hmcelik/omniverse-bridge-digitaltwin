[package]
title = "Bridge Digital Twin"
version = "0.1.0"  # Semantic Versioning is used: https://semver.org/
description = "Omniverse bridge digital twin with live sensor simulation, FEM stress analysis, fatigue damage tracking, dynamic OpenSees analysis, and safety alerts."
category = "Simulation"  # How to categorize this in the Extension Manager
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"  # Icon to show in the Extension Manager
keywords = ["bridge", "digital twin", "fem", "opensees", "fatigue", "sensor", "simulation"]  # Search keywords for the Extension Manager
preview_image = "data/preview.png"  # Preview to show in the Extension Manager
readme  = "docs/README.md"  # Path (relative to the root) or content of readme markdown file for UI
repository = "https://github.com/NVIDIA-Omniverse/kit-app-template"  # URL of the extension source repository


[dependencies]
"omni.kit.uiapp" = {}
"omni.usd" = {}

[settings]


[[python.module]]  # Main python module this extension provides, it will be publicly available as "import bridge.digitaltwin"
name = "bridge.digitaltwin"


[documentation]
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]


[[test]]
dependencies = [
    "omni.kit.test",
    "omni.kit.ui_test"  # UI testing extension
]

args = [
]
